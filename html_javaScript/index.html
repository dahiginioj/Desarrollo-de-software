<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CDN BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!--Cargar functions.js-->
    <script src="./functions.js"></script>
    <!--  <script>
        saludar();
    </script> -->

    <!--CAargar tarjetas-->
    <script src="./tarjetas.js"></script>

    <!--Style-->
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>

<body style="text-align: center;">

    <h1>Calculadora</h1>
    <!--CALCULADORA-->
    <!--Fila-->
    <div class="row">
        <!--Columna 1-->
        <div class="col-6 mb-3">
            <input type="number" class="form-control" id="num1" placeholder="Número 1">
        </div>
        <!--Columna 2-->
        <div class="col-6 mb-3">
            <input type="number" class="form-control" id="num2" placeholder="Número 2">
        </div>
    </div>

    <!--Botón de sumar, restar, multiplicar y dividir-->
    <button type="button" class="btn btn-primary" onclick="sumar()">Sumar</button>
    <button type="button" class="btn btn-primary" onclick="restar()">Restar</button>
    <button type="button" class="btn btn-primary" onclick="multiplicar()">Multiplicar</button>
    <button type="button" class="btn btn-primary" onclick="dividir()">Dividir</button>
    <br>
    <br> Resultado: <span id="resultado"></span>
    <br>
    <br>
    <br>
    <h1>Tarjeta</h1>
    <br>
    <button type="button" class="btn btn-success" onclick="cargarTarjetas()">Cargar tarjetas</button>
    <br>
    <div id="contenedor">
        <div class="card" style="width: 18rem;">
            <img id="imagen" src="../Fundamentos_html_css_javascript/assets/Firma DH.jpg" class="card-img-top" alt="img1">
            <div class="card-body">
                <h5 class="card-title">Firma</h5>
                <button type="button" class="btn btn-primary" onclick="actualizarImagen()">Actualizar</button>
            </div>
        </div>
    </div>

</body>

</html>
