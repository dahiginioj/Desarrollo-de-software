<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CDN BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!--Cargar estilos-->
    <link rel="stylesheet" href="./style.css">
    <!--Cargar fichero javaScript-->
    <script src="./functions.js"></script>
    <title>Registro Personas</title>
</head>

<body>
    <!--Titulo-->
    <span id="titulo">Registrar Persona</span>

    <!--Formulario de registro-->
    <form class="g-3 needs-validation">
        <!--Fila 1-->
        <div class="row">
            <!--Nombre-->
            <div class="col-6">
                <input type="text" class="form-control" id="nombre" placeholder="Nombre" required>
            </div>
            <!--Apellido-->
            <div class="col-6">
                <input type="text" class="form-control" id="apellido" placeholder="Apellido" required>
            </div>
        </div>
        <!--Fila 1-->
        <div class="row">
            <!--Email-->
            <div class="col-6">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <!--Ciudad-->
            <div class="col-6">
                <select id="municipios" class="col-6 form-select" aria-label="Default select example" required>
                        <option selected>Ciudad</option>
                    </select>
            </div>

        </div>

        <!--Botón de registro-->
        <button type="button" class="btn btn-primary" onclick="registrar()">Registrar</button>
        <!--Botón de actualizar-->
        <button type="button" class="btn btn-warning" onclick="actualizar()">Actualizar</button>
    </form>

    <!--Tabla-->
    <table class="table table-hover">
        <thead>
            <tr>
                <td>Nombre</td>
                <td>Apellido</td>
                <td>Email</td>
                <td>Ciudad</td>
                <td>Acciones</td>
            </tr>
        </thead>
        <tbody id="lista">
            <!-- <tr>
                <td id="f1c1">David</td>
                <td id="f1c2">Alejandro</td>
                <td id="f1c3">Higinio</td>
                <td id="f1c4">Jiménez</td>
                <td>
                    <button type="button" class="btn btn-primary" onclick="editar()">Editar</button>
                    <button type="button" class="btn btn-danger" onclick="eliminar()">Eliminar</button>

                </td>
            </tr> -->
        </tbody>
    </table>

</body>

</html>
